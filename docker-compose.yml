services:
  api:
    build:
      context: ./services/api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  web:
    build:
      context: ./services/web
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_URL: http://api:3000

  worker:
    build:
      context: ./services/worker
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
